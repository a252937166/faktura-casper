name: ci

permissions:
  contents: read

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  contracts:
    name: contracts (fmt + clippy + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: |
          rustup toolchain install "$(cat rust-toolchain)" --profile minimal --component rustfmt --component clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  agents:
    name: agents (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agents/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run build
